# ==================== 开发环境配置 ====================
spring:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 开发环境日志级别
logging:
  level:
    root: INFO
    com.moyuan: DEBUG
    org.springframework: WARN
