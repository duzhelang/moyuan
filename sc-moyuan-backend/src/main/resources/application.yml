server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: moyuan-backend

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:moyuan-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    root: INFO
    com.moyuan: DEBUG
    org.springframework: WARN