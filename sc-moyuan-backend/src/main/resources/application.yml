# ==================== 服务配置 ====================
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ==================== Spring 配置 ====================
spring:
  application:
    name: moyuan-backend
  profiles:
    active: dev
  config:
    import: optional:classpath:secrets/application-secrets.yml
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/moyuan?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      connection-error-retry-attempts: 3
      break-after-acquire-failure: true

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    com.moyuan: DEBUG
    org.springframework: WARN

# ==================== JWT 配置 ====================
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# ==================== 跨域配置 ====================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

# ==================== Knife4j 配置 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== 第三方 API 配置 ====================
apihz:
  id: ${APIHZ_ID}
  key: ${APIHZ_KEY}

# ==================== 业务配置 ====================
external:
  poetry:
    api:
      enabled: true
      url: https://v2.jinrishici.com
