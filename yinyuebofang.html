<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我家乡的石头有诗意</title>
  <style>
    :root {
      --primary-color: #ff6b6b;
      --dark-bg: linear-gradient(135deg, #1e3c72, #2a5298);
      --light-bg: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      --light-audio-bg: linear-gradient(135deg, #f06, #9f6);
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: '微软雅黑', sans-serif;
      min-height: 100vh;
      background: var(--dark-bg);
      transition: all 0.3s ease;
    }

    /* 标题栏样式 */
   .title-bar {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
      margin-bottom: 20px;
      transition: color 0.3s ease;
    }

    .light-mode .title-bar {
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    /* 轮播图样式 */
   .slider {
      width: 100%;
      height: 600px;
      margin: 0 auto 40px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

   .slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

   .slider img.active {
      display: block;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* 模式切换按钮 */
   .mode-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .light-mode {
      background: var(--light-bg);
      color: #333;
    }

    .light-mode .mode-toggle {
      background: rgba(0, 0, 0, 0.1);
      color: #333;
    }

    /* 音乐播放器 */
   .audio-player {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px 30px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
    }

    .light-mode .audio-player {
      background: var(--light-audio-bg);
    }

    audio {
      flex-grow: 1;
      margin: 0 20px;
      filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.1));
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    audio::-webkit-media-controls-panel {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .light-mode audio::-webkit-media-controls-panel {
      background: rgba(0, 0, 0, 0.1);
    }

    /* 进度条样式 */
   .progress-bar {
      width: 400px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      position: relative;
      margin-right: 20px;
    }

    .progress-bar .fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--primary-color);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .progress-bar .thumb {
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--primary-color);
      border-radius: 50%;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .light-mode .progress-bar {
      background: rgba(0, 0, 0, 0.3);
    }

    .light-mode .progress-bar .fill,
    .light-mode .progress-bar .thumb {
      background: #6c5ce7;
    }

    /* 时长显示 */
   .time-display {
      margin-left: 10px;
      color: white;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .light-mode .time-display {
      color: #333;
    }

    /* 音量调节 */
   .volume-control {
      width: 100px;
      margin-left: 20px;
    }

    /* 更多选项图标 */
   .more-options {
      position: relative;
      cursor: pointer;
      margin-left: 20px;
    }

   .more-options i {
      color: white;
      font-size: 20px;
      transition: color 0.3s ease;
    }

    .light-mode .more-options i {
      color: #333;
    }

   .speed-options {
      display: none;
      position: absolute;
      top: 30px;
      right: 0;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 10px;
      padding: 10px;
      z-index: 1;
    }

   .speed-options button {
      display: block;
      width: 100%;
      border: none;
      background: none;
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

   .speed-options button:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    /* 歌词样式 */
   .lyrics-container {
      text-align: center;
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 200px;
      overflow-y: auto;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      z-index: 1;
    }

    .light-mode .lyrics-container {
      background: rgba(0, 0, 0, 0.1);
    }

   .lyric {
      line-height: 36px;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: color 0.3s ease;
    }

   .lyric.active {
      color: var(--primary-color);
      font-weight: bold;
    }

    .light-mode .lyric {
      color: rgba(0, 0, 0, 0.8);
    }

    .light-mode .lyric.active {
      color: #6c5ce7;
    }

    /* 自定义滚动条样式 */
   .lyrics-container::-webkit-scrollbar {
      width: 8px;
    }

   .lyrics-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

   .lyrics-container::-webkit-scrollbar-thumb {
      background: var(--primary-color);
      border-radius: 4px;
    }

    .light-mode .lyrics-container::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }

    .light-mode .lyrics-container::-webkit-scrollbar-thumb {
      background: #6c5ce7;
    }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
</head>

<body>
  <div class="title-bar">我家乡的石头有诗意</div>
  <button class="mode-toggle" onclick="toggleMode()">切换模式</button>
  <div class="container">
    <!-- 轮播图 -->
    <div class="slider">
      <img src="D:\网页设计\用图\yue_ditu (1).jpeg" alt="背景图片1" class="active">
      <img src="D:\网页设计\用图\yue_ditu (2).jpeg" alt="背景图片2">
      <img src="D:\网页设计\用图\yue_ditu (3).jpeg" alt="背景图片3">
      <img src="D:\网页设计\用图\yue_ditu (4).jpeg" alt="背景图片4">
      <img src="D:\网页设计\用图\yue_ditu (5).jpeg" alt="背景图片5">
      <img src="D:\网页设计\用图\yue_ditu (6).jpeg" alt="背景图片6">
      <img src="D:\网页设计\用图\yue_ditu (7).jpeg" alt="背景图片7">
    </div>

    <!-- 歌词区域 -->
    <div class="lyrics-container" id="lyricsContainer">
      <!-- 歌词会通过JS动态生成 -->
    </div>

    <!-- 音乐播放器 -->
    <div class="audio-player">
      <audio id="audio" controls>
        <source src="D:\网页设计\yanshi_sucai_yinyue\Raper1.mp3" type="audio/mpeg">
      </audio>
      <div class="progress-bar" id="progressBar">
        <div class="fill" id="progressFill"></div>
        <div class="thumb" id="progressThumb"></div>
      </div>
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
      <input type="range" class="volume-control" id="volumeControl" min="0" max="1" step="0.1" value="1">
      <div class="more-options" onclick="toggleSpeedOptions()">
        <i class="fa-solid fa-ellipsis-vertical"></i>
        <div class="speed-options" id="speedOptions">
          <button onclick="setPlaybackSpeed(0.5)">0.5x</button>
          <button onclick="setPlaybackSpeed(0.75)">0.75x</button>
          <button onclick="setPlaybackSpeed(1)">1x</button>
          <button onclick="setPlaybackSpeed(1.25)">1.25x</button>
          <button onclick="setPlaybackSpeed(1.5)">1.5x</button>
          <button onclick="setPlaybackSpeed(2)">2x</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 初始化变量
    const audio = document.getElementById('audio');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressThumb = document.getElementById('progressThumb');
    const lyricsContainer = document.getElementById('lyricsContainer');
    const timeDisplay = document.getElementById('timeDisplay');
    const volumeControl = document.getElementById('volumeControl');
    const speedOptions = document.getElementById('speedOptions');
    let isDragging = false;

    // 歌词数据（格式：[时间戳, 歌词内容]）
    const lyricsData = [
      [0, "Verse1"],
      [5, "路过壶林书院，风中传来锤响"],
      [10, "壶关这片土地，永远是我家乡"],
      [15, "沙窟垴在石器时代孕育着梦想"],
      [20, "小时候的抓石子游戏，入我梦乡"],
      [25, "壶关的石头我来说，说不完的诗意"],
      [30, "壶关石雕有故事，也有汗水和笑意"],
      [35, "Verse1"],
      [40, "走过漫长的历史，看壶关石雕的美丽"],
      [45, "壶林的风光如花，让我为你伏笔"],
      [50, "孔子像在招手，那是儒学的召唤"],
      [55, "师傅和徒弟用十年建院多么感慨"],
      [60, "石池的鲤鱼游动，欢庆着石雕的秘密"],
      [65, "坚实的石碑写满了惊人的手艺"],
      [70, "东边的书屋传来，那儒学的梦呓"],
      [75, "我站在壶林书院，感受着石头的呼吸"],
      [80, "那是儿时的记忆那是远古的回忆"],
      [85, "每一个脚步都敲响了石头的诗意"],
      [90, "Hook:"],
      [95, "我家乡的石头有诗意，我要唱给你"],
      [100, "这里是大美太行这里是壶关石雕"],
      [105, "Hook:"],
      [110, "我家乡的石头有诗意，我要唱给你"],
      [115, "壶关的石头我来说，说不完的诗意"],
      [120, "壶关石雕有故事，也有汗水和欢喜"],
      [125, "这里是文化旅游的圣地，我在等着你"],
      [130, "Bridge:"],
      [135, "壶关石雕，你是我心中的诗"],
      [140, "壶关石雕，我的爱永远留给你"],
      [145, "在这片土地上，我找到了自己的梦想"],
      [150, "不管你来不来我的家乡，而我一直在等你"],
      [155, "Outro:"],
      [160, "我家乡的石头有诗意，我要唱给你"],
      [165, "让我们一起唱响，这首诗的RAP"],
      [170, "为壶关点赞，为壶关石雕加油和喝彩。"]
    ];

    // 生成歌词列表
    function generateLyrics() {
      lyricsData.forEach(([time, text], index) => {
        const lyric = document.createElement('div');
        lyric.className = 'lyric';
        lyric.dataset.time = time;
        lyric.textContent = text;
        lyric.onclick = () => jumpToTime(time);
        lyricsContainer.appendChild(lyric);
      });
    }

    // 模式切换
    function toggleMode() {
      document.body.classList.toggle('light-mode');
    }

    // 轮播图切换
    function initSlider() {
      const images = document.querySelectorAll('.slider img');
      let current = 0;
      setInterval(() => {
        images[current].classList.remove('active');
        current = (current + 1) % images.length;
        images[current].classList.add('active');
      }, 5000);
    }

    // 格式化时间
    function formatTime(time) {
      const minutes = Math.floor(time / 60);
      const seconds = Math.floor(time % 60);
      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    // 进度条更新
    function updateProgress() {
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
      progressThumb.style.left = `${percent}%`;

      // 更新时长显示
      timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;

      // 更新歌词高亮
      lyricsData.forEach(([time, text], index) => {
        const lyric = lyricsContainer.children[index];
        if (audio.currentTime >= time - 0.5 && audio.currentTime < (lyricsData[index + 1]?.[0] || time)) {
          lyric.classList.add('active');
          // 滚动歌词容器使当前歌词居中
          const lyricTop = lyric.offsetTop;
          const containerHeight = lyricsContainer.offsetHeight;
          const lyricHeight = lyric.offsetHeight;
          const scrollTop = lyricTop - containerHeight / 2 + lyricHeight / 2;
          lyricsContainer.scrollTop = scrollTop;
        } else {
          lyric.classList.remove('active');
        }
      });
    }

    // 点击进度条跳转
    progressBar.addEventListener('click', (e) => {
      const x = e.clientX - progressBar.getBoundingClientRect().left;
      const percent = (x / progressBar.clientWidth) * audio.duration;
      audio.currentTime = percent;
      isDragging = true;
      updateProgress();
    });

    // 拖动进度条
    progressThumb.addEventListener('mousedown', () => {
      isDragging = true;
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });

    function onMouseMove(e) {
      if (!isDragging) return;
      const x = e.clientX - progressBar.getBoundingClientRect().left;
      const percent = Math.max(0, Math.min(100, (x / progressBar.clientWidth) * 100));
      progressFill.style.width = `${percent}%`;
      progressThumb.style.left = `${percent}%`;
      audio.currentTime = (percent / 100) * audio.duration;
    }

    function onMouseUp() {
      isDragging = false;
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    }

    // 歌词点击跳转
    function jumpToTime(time) {
      audio.currentTime = time;
      updateProgress();
    }

    // 音量调节
    volumeControl.addEventListener('input', () => {
      audio.volume = volumeControl.value;
    });

    // 切换播放速度选项
    function toggleSpeedOptions() {
      speedOptions.style.display = speedOptions.style.display === 'block' ? 'none' : 'block';
    }

    // 设置播放速度
    function setPlaybackSpeed(speed) {
      audio.playbackRate = speed;
      toggleSpeedOptions();
    }

    // 初始化函数
    function init() {
      generateLyrics();
      initSlider();
      audio.addEventListener('timeupdate', () => {
        if (!isDragging) updateProgress();
      });
      audio.addEventListener('loadedmetadata', () => {
        timeDisplay.textContent = `${formatTime(0)} / ${formatTime(audio.duration)}`;
      });
    }

    // 页面加载后初始化
    window.onload = init;
  </script>
</body>

</html>
