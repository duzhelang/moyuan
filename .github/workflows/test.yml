name: 测试流程

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-test:
    name: 前端测试
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml
    
    - name: 安装pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: 安装依赖
      working-directory: frontend
      run: pnpm install
    
    - name: 运行类型检查
      working-directory: frontend
      run: pnpm type-check
    
    - name: 运行代码规范检查
      working-directory: frontend
      run: pnpm lint
    
    - name: 运行单元测试
      working-directory: frontend
      run: pnpm test:run
    
    - name: 生成测试覆盖率报告
      working-directory: frontend
      run: pnpm test:coverage
    
    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v3
      with:
        files: frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: ['17', '21']
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Java ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    
    - name: 运行单元测试
      working-directory: sc-moyuan-backend
      run: mvn test
    
    - name: 生成测试覆盖率报告
      working-directory: sc-moyuan-backend
      run: mvn test jacoco:report
    
    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v3
      with:
        files: sc-moyuan-backend/target/site/jacoco/jacoco.xml
        flags: backend
        name: backend-coverage
    
    - name: 上传测试结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results-java-${{ matrix.java-version }}
        path: sc-moyuan-backend/target/surefire-reports/

  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: moyuan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: 等待MySQL就绪
      run: |
        while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
          sleep 1
        done
    
    - name: 初始化测试数据库
      working-directory: sc-moyuan-backend
      run: |
        mysql -h 127.0.0.1 -u root -ptestpassword moyuan_test < src/main/resources/db/init.sql
    
    - name: 运行集成测试
      working-directory: sc-moyuan-backend
      run: mvn test -Dspring.profiles.active=test
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/moyuan_test
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: testpassword
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379

  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: [integration-test]
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml
    
    - name: 安装pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: 安装前端依赖
      working-directory: frontend
      run: pnpm install
    
    - name: 构建前端
      working-directory: frontend
      run: pnpm build
    
    - name: 设置Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: 构建后端
      working-directory: sc-moyuan-backend
      run: mvn clean package -DskipTests