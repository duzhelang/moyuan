<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1200" font-family="Microsoft YaHei, Arial">
  <!-- 背景 -->
  <rect width="1400" height="1200" fill="#1a1a2e"/>
  
  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">墨渊（MoYuan）- 数据库 ER 关系图</text>
  <text x="700" y="65" text-anchor="middle" fill="#9ca3af" font-size="14">11 张核心表 | MySQL 8.0+</text>
  
  <!-- 图例 -->
  <rect x="50" y="85" width="15" height="15" fill="#4a90e2" rx="2"/>
  <text x="72" y="97" fill="#e0e0e0" font-size="11">诗词核心域</text>
  <rect x="180" y="85" width="15" height="15" fill="#a855f7" rx="2"/>
  <text x="202" y="97" fill="#e0e0e0" font-size="11">用户社交域</text>
  <rect x="310" y="85" width="15" height="15" fill="#00d2ff" rx="2"/>
  <text x="332" y="97" fill="#e0e0e0" font-size="11">用户行为域</text>
  <rect x="440" y="85" width="15" height="15" fill="#22c55e" rx="2"/>
  <text x="462" y="97" fill="#e0e0e0" font-size="11">系统运维域</text>
  
  <!-- dynasty 表 -->
  <g transform="translate(100, 130)">
    <rect width="200" height="180" fill="#16213e" stroke="#4a90e2" stroke-width="2" rx="5"/>
    <rect width="200" height="30" fill="#4a90e2" rx="5"/>
    <rect width="200" height="25" fill="#4a90e2"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">dynasty 朝代表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#e0e0e0" font-size="10">name (朝代名称, 唯一)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">start_year (开始年份)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">end_year (结束年份)</text>
    <text x="10" y="123" fill="#e0e0e0" font-size="10">description (朝代简介)</text>
    <text x="10" y="140" fill="#e0e0e0" font-size="10">sort_order (排序顺序)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">create_time (创建时间)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">update_time (更新时间)</text>
  </g>
  
  <!-- poet 表 -->
  <g transform="translate(100, 340)">
    <rect width="200" height="240" fill="#16213e" stroke="#4a90e2" stroke-width="2" rx="5"/>
    <rect width="200" height="30" fill="#4a90e2" rx="5"/>
    <rect width="200" height="25" fill="#4a90e2"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">poet 诗人表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#e0e0e0" font-size="10">name (诗人姓名)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">courtesy_name (字)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">pseudonym (号)</text>
    <text x="10" y="123" fill="#ffd700" font-size="10">FK dynasty_id (朝代ID)</text>
    <text x="10" y="140" fill="#e0e0e0" font-size="10">birth_year (出生年份)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">death_year (去世年份)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">birthplace (出生地)</text>
    <text x="10" y="191" fill="#e0e0e0" font-size="10">biography (生平简介)</text>
    <text x="10" y="208" fill="#e0e0e0" font-size="10">avatar (头像URL)</text>
    <text x="10" y="225" fill="#e0e0e0" font-size="10">status (状态)</text>
  </g>
  
  <!-- category 表 -->
  <g transform="translate(550, 130)">
    <rect width="200" height="180" fill="#16213e" stroke="#4a90e2" stroke-width="2" rx="5"/>
    <rect width="200" height="30" fill="#4a90e2" rx="5"/>
    <rect width="200" height="25" fill="#4a90e2"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">category 诗词分类表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#e0e0e0" font-size="10">name (分类名称)</text>
    <text x="10" y="89" fill="#ffd700" font-size="10">FK parent_id (父分类ID, 自关联)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">description (分类描述)</text>
    <text x="10" y="123" fill="#e0e0e0" font-size="10">icon (分类图标)</text>
    <text x="10" y="140" fill="#e0e0e0" font-size="10">sort_order (排序顺序)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">status (状态)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">create_time (创建时间)</text>
  </g>
  
  <!-- poem 表 -->
  <g transform="translate(550, 340)">
    <rect width="200" height="300" fill="#16213e" stroke="#4a90e2" stroke-width="2" rx="5"/>
    <rect width="200" height="30" fill="#4a90e2" rx="5"/>
    <rect width="200" height="25" fill="#4a90e2"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">poem 诗词表 (核心)</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#e0e0e0" font-size="10">title (诗词标题)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">content (诗词内容)</text>
    <text x="10" y="106" fill="#ffd700" font-size="10">FK poet_id (诗人ID)</text>
    <text x="10" y="123" fill="#ffd700" font-size="10">FK dynasty_id (朝代ID)</text>
    <text x="10" y="140" fill="#ffd700" font-size="10">FK category_id (分类ID)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">translation (译文)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">appreciation (赏析)</text>
    <text x="10" y="191" fill="#e0e0e0" font-size="10">background (创作背景)</text>
    <text x="10" y="208" fill="#e0e0e0" font-size="10">view_count (浏览次数)</text>
    <text x="10" y="225" fill="#e0e0e0" font-size="10">like_count (点赞次数)</text>
    <text x="10" y="242" fill="#e0e0e0" font-size="10">favorite_count (收藏次数)</text>
    <text x="10" y="259" fill="#e0e0e0" font-size="10">status (状态)</text>
    <text x="10" y="276" fill="#e0e0e0" font-size="10">is_featured (是否精选)</text>
  </g>
  
  <!-- user 表 -->
  <g transform="translate(850, 130)">
    <rect width="200" height="240" fill="#16213e" stroke="#a855f7" stroke-width="2" rx="5"/>
    <rect width="200" height="30" fill="#a855f7" rx="5"/>
    <rect width="200" height="25" fill="#a855f7"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">user 用户表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#e0e0e0" font-size="10">username (用户名, 唯一)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">password (密码, BCrypt加密)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">email (邮箱, 唯一)</text>
    <text x="10" y="123" fill="#e0e0e0" font-size="10">phone (手机号)</text>
    <text x="10" y="140" fill="#e0e0e0" font-size="10">nickname (昵称)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">avatar (头像URL)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">bio (个人简介)</text>
    <text x="10" y="191" fill="#e0e0e0" font-size="10">status (状态)</text>
    <text x="10" y="208" fill="#e0e0e0" font-size="10">last_login_time (最后登录)</text>
    <text x="10" y="225" fill="#e0e0e0" font-size="10">last_login_ip (最后登录IP)</text>
  </g>
  
  <!-- forum_post 表 -->
  <g transform="translate(850, 400)">
    <rect width="200" height="240" fill="#16213e" stroke="#a855f7" stroke-width="2" rx="5"/>
    <rect width="200" height="30" fill="#a855f7" rx="5"/>
    <rect width="200" height="25" fill="#a855f7"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">forum_post 论坛帖子表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#e0e0e0" font-size="10">title (帖子标题)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">content (帖子内容)</text>
    <text x="10" y="106" fill="#ffd700" font-size="10">FK user_id (发帖用户ID)</text>
    <text x="10" y="123" fill="#e0e0e0" font-size="10">category (帖子分类)</text>
    <text x="10" y="140" fill="#e0e0e0" font-size="10">view_count (浏览次数)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">like_count (点赞次数)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">comment_count (评论数量)</text>
    <text x="10" y="191" fill="#e0e0e0" font-size="10">is_top (是否置顶)</text>
    <text x="10" y="208" fill="#e0e0e0" font-size="10">is_featured (是否精选)</text>
    <text x="10" y="225" fill="#e0e0e0" font-size="10">status (状态)</text>
  </g>
  
  <!-- comment 表 -->
  <g transform="translate(850, 670)">
    <rect width="200" height="200" fill="#16213e" stroke="#a855f7" stroke-width="2" rx="5"/>
    <rect width="200" height="30" fill="#a855f7" rx="5"/>
    <rect width="200" height="25" fill="#a855f7"/>
    <text x="100" y="20" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">comment 评论表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#e0e0e0" font-size="10">content (评论内容)</text>
    <text x="10" y="89" fill="#ffd700" font-size="10">FK user_id (评论用户ID)</text>
    <text x="10" y="106" fill="#ffd700" font-size="10">FK post_id (帖子ID)</text>
    <text x="10" y="123" fill="#ffd700" font-size="10">FK parent_id (父评论ID, 自关联)</text>
    <text x="10" y="140" fill="#e0e0e0" font-size="10">reply_to_user_id (回复目标用户ID)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">like_count (点赞次数)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">status (状态)</text>
  </g>
  
  <!-- user_favorite 表 -->
  <g transform="translate(1100, 130)">
    <rect width="180" height="150" fill="#16213e" stroke="#00d2ff" stroke-width="2" rx="5"/>
    <rect width="180" height="30" fill="#00d2ff" rx="5"/>
    <rect width="180" height="25" fill="#00d2ff"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">user_favorite 用户收藏表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#ffd700" font-size="10">FK user_id (用户ID)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">target_id (收藏目标ID)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">target_type (收藏类型)</text>
    <text x="10" y="118" fill="#9ca3af" font-size="9">1:诗词 2:帖子 3:诗人</text>
    <text x="10" y="135" fill="#e0e0e0" font-size="10">create_time (创建时间)</text>
  </g>
  
  <!-- user_like 表 -->
  <g transform="translate(1100, 310)">
    <rect width="180" height="150" fill="#16213e" stroke="#00d2ff" stroke-width="2" rx="5"/>
    <rect width="180" height="30" fill="#00d2ff" rx="5"/>
    <rect width="180" height="25" fill="#00d2ff"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">user_like 用户点赞表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#ffd700" font-size="10">FK user_id (用户ID)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">target_id (点赞目标ID)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">target_type (点赞类型)</text>
    <text x="10" y="118" fill="#9ca3af" font-size="9">1:诗词 2:帖子 3:评论</text>
    <text x="10" y="135" fill="#e0e0e0" font-size="10">create_time (创建时间)</text>
  </g>
  
  <!-- user_history 表 -->
  <g transform="translate(1100, 490)">
    <rect width="180" height="150" fill="#16213e" stroke="#00d2ff" stroke-width="2" rx="5"/>
    <rect width="180" height="30" fill="#00d2ff" rx="5"/>
    <rect width="180" height="25" fill="#00d2ff"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">user_history 浏览历史表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#ffd700" font-size="10">FK user_id (用户ID)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">target_id (浏览目标ID)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">target_type (浏览类型)</text>
    <text x="10" y="118" fill="#9ca3af" font-size="9">1:诗词 2:诗人 3:帖子</text>
    <text x="10" y="135" fill="#e0e0e0" font-size="10">create_time (创建时间)</text>
  </g>
  
  <!-- operation_log 表 -->
  <g transform="translate(1100, 670)">
    <rect width="180" height="200" fill="#16213e" stroke="#22c55e" stroke-width="2" rx="5"/>
    <rect width="180" height="30" fill="#22c55e" rx="5"/>
    <rect width="180" height="25" fill="#22c55e"/>
    <text x="90" y="20" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">operation_log 操作日志表</text>
    <text x="10" y="55" fill="#e0e0e0" font-size="10">PK id (主键)</text>
    <text x="10" y="72" fill="#ffd700" font-size="10">FK user_id (可为空)</text>
    <text x="10" y="89" fill="#e0e0e0" font-size="10">username (操作用户名)</text>
    <text x="10" y="106" fill="#e0e0e0" font-size="10">operation (操作类型)</text>
    <text x="10" y="123" fill="#e0e0e0" font-size="10">method (请求方法)</text>
    <text x="10" y="140" fill="#e0e0e0" font-size="10">ip (请求IP)</text>
    <text x="10" y="157" fill="#e0e0e0" font-size="10">duration (请求时长)</text>
    <text x="10" y="174" fill="#e0e0e0" font-size="10">status (操作状态)</text>
  </g>
  
  <!-- 关系连线 -->
  <!-- dynasty -> poet -->
  <line x1="200" y1="310" x2="200" y2="340" stroke="#4a90e2" stroke-width="2"/>
  <polygon points="195,338 205,338 200,345" fill="#4a90e2"/>
  <text x="215" y="330" fill="#00d2ff" font-size="9">1:N 朝代→诗人</text>
  
  <!-- dynasty -> poem -->
  <line x1="300" y1="220" x2="550" y2="220" stroke="#4a90e2" stroke-width="2"/>
  <line x1="550" y1="220" x2="550" y2="340" stroke="#4a90e2" stroke-width="2"/>
  <polygon points="545,338 555,338 550,345" fill="#4a90e2"/>
  <text x="400" y="215" fill="#00d2ff" font-size="9">1:N 朝代→诗词</text>
  
  <!-- poet -> poem -->
  <line x1="300" y1="460" x2="550" y2="460" stroke="#4a90e2" stroke-width="2"/>
  <line x1="550" y1="460" x2="550" y2="420" stroke="#4a90e2" stroke-width="2"/>
  <polygon points="545,422 555,422 550,415" fill="#4a90e2"/>
  <text x="400" y="455" fill="#00d2ff" font-size="9">1:N 诗人→诗词</text>
  
  <!-- category -> poem -->
  <line x1="650" y1="310" x2="650" y2="340" stroke="#4a90e2" stroke-width="2"/>
  <polygon points="645,338 655,338 650,345" fill="#4a90e2"/>
  <text x="665" y="330" fill="#00d2ff" font-size="9">1:N 分类→诗词</text>
  
  <!-- category 自关联 -->
  <path d="M 700 130 Q 750 110 750 130 Q 750 150 700 150" fill="none" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="755" y="140" fill="#00d2ff" font-size="9">自关联</text>
  
  <!-- user -> forum_post -->
  <line x1="950" y1="370" x2="950" y2="400" stroke="#a855f7" stroke-width="2"/>
  <polygon points="945,398 955,398 950,405" fill="#a855f7"/>
  <text x="965" y="390" fill="#00d2ff" font-size="9">1:N 用户→帖子</text>
  
  <!-- user -> comment -->
  <line x1="1050" y1="370" x2="1050" y2="670" stroke="#a855f7" stroke-width="2"/>
  <line x1="950" y1="370" x2="1050" y2="370" stroke="#a855f7" stroke-width="2"/>
  <polygon points="1045,668 1055,668 1050,675" fill="#a855f7"/>
  <text x="1065" y="520" fill="#00d2ff" font-size="9">1:N 用户→评论</text>
  
  <!-- forum_post -> comment -->
  <line x1="950" y1="640" x2="950" y2="670" stroke="#a855f7" stroke-width="2"/>
  <polygon points="945,668 955,668 950,675" fill="#a855f7"/>
  <text x="965" y="660" fill="#00d2ff" font-size="9">1:N 帖子→评论</text>
  
  <!-- comment 自关联 -->
  <path d="M 1050 670 Q 1100 650 1100 670 Q 1100 690 1050 690" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="1105" y="680" fill="#00d2ff" font-size="9">自关联</text>
  
  <!-- user -> user_favorite -->
  <line x1="1050" y1="250" x2="1100" y2="200" stroke="#00d2ff" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="1095,202 1105,198 1100,190" fill="#00d2ff"/>
  <text x="1075" y="220" fill="#00d2ff" font-size="9">1:N 多态</text>
  
  <!-- user -> user_like -->
  <line x1="1050" y1="280" x2="1100" y2="380" stroke="#00d2ff" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="1095,378 1105,382 1100,390" fill="#00d2ff"/>
  
  <!-- user -> user_history -->
  <line x1="1050" y1="310" x2="1100" y2="560" stroke="#00d2ff" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="1095,558 1105,562 1100,570" fill="#00d2ff"/>
  
  <!-- user -> operation_log -->
  <line x1="1050" y1="340" x2="1100" y2="770" stroke="#22c55e" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="1095,768 1105,772 1100,780" fill="#22c55e"/>
  <text x="1075" y="560" fill="#22c55e" font-size="9">1:N 可为NULL</text>
  
  <!-- 底部说明 -->
  <text x="100" y="950" fill="#e0e0e0" font-size="13" font-weight="bold">外键约束清单：</text>
  <text x="100" y="975" fill="#ffd700" font-size="10">FK fk_poem_poet: poem.poet_id → poet.id (诗词→诗人)</text>
  <text x="100" y="995" fill="#ffd700" font-size="10">FK fk_poem_dynasty: poem.dynasty_id → dynasty.id (诗词→朝代)</text>
  <text x="100" y="1015" fill="#ffd700" font-size="10">FK fk_poem_category: poem.category_id → category.id (诗词→分类)</text>
  <text x="100" y="1035" fill="#ffd700" font-size="10">FK fk_forum_post_user: forum_post.user_id → user.id (帖子→用户)</text>
  <text x="100" y="1055" fill="#ffd700" font-size="10">FK fk_comment_user: comment.user_id → user.id (评论→用户)</text>
  <text x="100" y="1075" fill="#ffd700" font-size="10">FK fk_comment_post: comment.post_id → forum_post.id (评论→帖子)</text>
  
  <text x="100" y="1110" fill="#e0e0e0" font-size="13" font-weight="bold">关系类型说明：</text>
  <line x1="100" y1="1130" x2="150" y2="1130" stroke="#4a90e2" stroke-width="2"/>
  <text x="160" y="1135" fill="#e0e0e0" font-size="10">实线 = 强制外键约束 (1:N)</text>
